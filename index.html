<!DOCTYPE html>
<html>
<head>
<title>My letter for my Honey</title>
<style>
body {
    background: black;
    color: #ff4d6d;
    font-family: monospace;
    text-align: center;
    margin: 0;
    padding: 0;
}
#image {
    margin-top: 20px;
    max-width: 75%;
    max-height: 50%;
    border-radius: 15px;
    box-shadow: 0 0 20px #ff4d6d;
}
#letter {
    margin-top: 30px;
    font-size: 45px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
    text-align: left;
}
h2, h3 {
    margin: 20px 0 10px 0;
    font-size: 50px;
}
iframe {
    border-radius: 10px;
}
</style>
</head>
<body>

<h2>Happy 40th Monthsarry hon💋</h2>

<!-- Real couple image -->
<img id="image" src="https://raw.githubusercontent.com/capistranojp/Love-Letter-Website/main/us.jpg" alt="Couple Image">



<!-- 🎶 Music: Uuwian from YouTube -->
<div style="margin-top:30px;">
  <h3>🎶 Bruno Mars - Risk it All</h3>
  <iframe width="70%" height="720px"
    src="https://www.youtube.com/embed/JOYfeeD413U"
    title="Bruno Mars - Risk it All"
    frameborder="1"
    allowfullscreen>
  </iframe>
</div>

<div id="letter"></div>

<script>
const letterDiv = document.getElementById("letter");

window.onload = function() {
    // Start typing letter after a short delay
    setTimeout(showLetter, 800);
}

function typeWriter(text, i = 0) {
    if (i < text.length) {
        letterDiv.innerHTML += text.charAt(i);
        setTimeout(() => typeWriter(text, i + 1), 75);
    }
}

function showLetter() {
    const letter = `

Hi honey ko, Happy 40th Monthsarry to us! Looking back sobrang dami na nating napag daanan, as in pag binalikan natin alaala at kung maari man na makita natin yon, sobrang dami na nating naranasan. Nagsimula tayo sa pagiging comfort person ng isa't isa, pero mas lamang ako dun dahil hindi ka masyado nag kekwento saakin hon. Not until nung nahuhulog na'ko sa'yo ay natanong kita about yourself, mas pinursue ko malaman kung sino ka, kung ano pinag dadaanan mo, naging curious ako sayo. Nung una, hindi tayo stable, hindi tayo sure sa isa't isa dahil sa hindi ka sure kung mag cocommit ka ba, at dahil ako'y may pinag daraanan pa. Pero dahil nag commit ka at sinamahan, tinulungan, ni-guide mo ako at itinayo sa pagkalungkot, bagsak binigyan liwanag ang kadilimang nasa isip at puso ko. Nagkaron tayo ng maraming maraming maraming ups and downs, at syempre di naman nawawala yon meron pa yan sa ating mga kinabukasan. Pero yun nga, nalampasan natin yon sa kabila ng lahat ng nangyari ay eto parin tayo, mag aapat na taon na rin ngayung taon. I have loved you since we were 17, and now i'm 20, turning 21 I still love you, but I love you even more now than when we were 17. Honey, wala na akong ibang pipiliin pa, wala na akong ibang mamahalin pa kung hindi ikaw, ay wag nalang. Mag pari nalang ako HAHAHAHAHAHA. Gusto ko na makasama ka sa iisang bahay araw araw, gusto ko narin mas mapatatag ang ating pag sasama sa pamamagitan ng seremonya ng kasal. Gustong gusto ko na magkaron ng trabaho para makamit na lahat ng yon, para matulungan ko pamilya ko, at pamilya mo at tayong dalawa. Honey dahil sayo, marami akong natutunan sa sarili ko na hindi ko pa alam, hindi ko alam na kaya ko pala mag mahal ng ganito, hindi ko alam na kaya ko pala na hindi iprioritize sarili ko sa mga bagay bagay. Dahil kilala ko ang sarili ko, alam kong selfish ako, sarili ko lang iniisip ko, at mas lalo ng wala akong pake sa mga bagay bagay lalo ng nung mga araw na hindi pa kita nakikilala, may sarili akong mundo at hindi ako ma-socialize. Dahil ginusto ko mag bago at ng mag bago ako, simula yon nung makasama kita. Mas naging confident ako, mas masalita, nawala yung hiya ko, nagkaron ako ng boses. Maraming salamat sayo hon, dahil palagi kang naanjan para saakin, salamat dahil hindi ka nag sasawa saakin, salamat dahil hindi mo ako sinusukuan. Maraming maraming salamat sayo hon dahil di ka nag sasawang mahalin ako at maging proud saakin. Pasensya na sa mga araw na hindi ako okay, hindi tayo okay. Hon, mahal na mahal kita. Wag ka ng mawawala ha? I love you so much! Happy 40th Monthsarry mahal ko🥰🥹💋
`;

    typeWriter(letter);
}
</script>

</body>
</html>
